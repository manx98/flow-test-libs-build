name: Build OpenCV dependency packages

on:
  workflow_dispatch:
    inputs:
      target:
        description: Platform to build
        type: choice
        required: true
        default: all
        options:
          - all
          - linux
          - windows

permissions:
  contents: write

jobs:
  linux:
    name: Linux Ubuntu 18.04 x64
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'all' || inputs.target == 'linux' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Build in Ubuntu 18.04 container
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            ubuntu:18.04 \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential ca-certificates cmake file git ninja-build patchelf pkg-config python3 tar libvulkan-dev

              export PKG_NAME=opencv-linux-ubuntu-18.04-x64
              export OPENCV_SRC=/work/opencv
              export INSTALL_DIR=/work/package-root/$PKG_NAME
              export BUILD_DIR=/work/build-opencv-linux
              export WITH_VULKAN=ON
              export JOBS="$(nproc)"
              rm -rf "$BUILD_DIR" /work/package-root /work/artifacts
              ./build.sh

              mkdir -p "$INSTALL_DIR/lib"
              cp -L /usr/lib/x86_64-linux-gnu/libvulkan.so.1 "$INSTALL_DIR/lib/libvulkan.so"
              for so in "$INSTALL_DIR"/lib/libopencv_*.so*; do
                [[ -f "$so" ]] || continue
                ldd "$so" | awk '\''/=> \// {print $3}'\'' | while read -r dep; do
                  dep_name="$(basename "$dep")"
                  dst="$INSTALL_DIR/lib/$dep_name"
                  case "$dep_name" in
                    libc.so.*|libm.so.*|libdl.so.*|libpthread.so.*|librt.so.*|ld-linux-*.so.*|libstdc++*.so.*|libgcc*.so.*) ;;
                    *)
                      if [[ -e "$dst" ]] && [[ "$(readlink -f "$dep")" == "$(readlink -f "$dst")" ]]; then
                        continue
                      fi
                      cp -Ln "$dep" "$INSTALL_DIR/lib/"
                      ;;
                  esac
                done
              done
              find "$INSTALL_DIR/lib" -maxdepth 1 -name "libopencv_*.so*" -type f -exec patchelf --set-rpath "\$ORIGIN" {} +

              {
                echo "OpenCV: $(PKG_CONFIG_PATH="$INSTALL_DIR/lib/pkgconfig" pkg-config --modversion opencv4)"
                echo "Platform: linux-ubuntu-18.04-x64"
                echo "Modules: ${MODULES:-core,imgproc,imgcodecs}"
                echo "Vulkan: required"
                echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              } > "$INSTALL_DIR/BUILD_INFO.txt"

              mkdir -p /work/artifacts
              tar -C /work/package-root -czf /work/artifacts/$PKG_NAME.tar.gz "$PKG_NAME"
            '

      - uses: actions/upload-artifact@v4
        with:
          name: opencv-linux-ubuntu-18.04-x64
          path: artifacts/opencv-linux-ubuntu-18.04-x64.tar.gz
          if-no-files-found: error
          retention-days: 7

  windows:
    name: Windows MinGW UCRT64 x64
    runs-on: windows-latest
    if: ${{ inputs.target == 'all' || inputs.target == 'windows' }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            tar
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-vulkan-headers
            mingw-w64-ucrt-x86_64-vulkan-loader

      - name: Build and package
        run: |
          set -euo pipefail
          export PKG_NAME=opencv-windows-mingw-ucrt64-x64
          export OPENCV_SRC="$PWD/opencv"
          export INSTALL_DIR="$PWD/package-root/$PKG_NAME"
          export BUILD_DIR="$PWD/build-opencv-windows"
          export WITH_VULKAN=ON
          export JOBS="$(nproc)"
          rm -rf "$BUILD_DIR" package-root artifacts
          ./build.sh

          mkdir -p "$INSTALL_DIR/bin"
          copied_vulkan=0
          for dll in /ucrt64/bin/libvulkan-1.dll /ucrt64/bin/vulkan-1.dll; do
            if [[ -f "$dll" ]]; then
              cp -L "$dll" "$INSTALL_DIR/bin"
              copied_vulkan=1
            fi
          done
          if [[ "$copied_vulkan" -ne 1 ]]; then
            echo "Vulkan loader DLL not found." >&2
            exit 1
          fi
          for dll in libstdc++-6.dll libgcc_s_seh-1.dll libwinpthread-1.dll; do
            cp -L "/ucrt64/bin/$dll" "$INSTALL_DIR/bin/"
          done

          # Do not package real static archives on Windows.
          # Keep MinGW .dll.a import libraries because they are required to link against the packaged DLLs.
          find "$INSTALL_DIR" -type f -name "*.a" ! -name "*.dll.a" -print -delete

          {
            echo "OpenCV: $(PKG_CONFIG_PATH="$INSTALL_DIR/lib/pkgconfig" pkg-config --modversion opencv4)"
            echo "Platform: windows-mingw-ucrt64-x64"
            echo "Modules: ${MODULES:-core,imgproc,imgcodecs}"
            echo "Vulkan: required"
            echo "Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$INSTALL_DIR/BUILD_INFO.txt"

          mkdir -p artifacts
          tar -C package-root -czf "artifacts/$PKG_NAME.tar.gz" "$PKG_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: opencv-windows-mingw-ucrt64-x64
          path: artifacts/opencv-windows-mingw-ucrt64-x64.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - linux
      - windows
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-artifacts/*.tar.gz)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release artifacts found." >&2
            find release-artifacts -type f -print >&2 || true
            exit 1
          fi

          tag_name="$(date -u +%Y%m%d)"
          release_name="OpenCV dependency packages ${tag_name}"

          {
            echo "OpenCV dependency packages."
            echo
            echo "Date tag: ${tag_name}"
            echo "Target: ${{ inputs.target }}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Workflow run: ${GITHUB_RUN_NUMBER}"
            echo
            echo "Artifacts:"
            for asset in "${assets[@]}"; do
              echo "- $(basename "$asset")"
            done
          } > RELEASE_NOTES.md

          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release delete "$tag_name" --yes --cleanup-tag
          elif git ls-remote --exit-code --tags origin "refs/tags/$tag_name" >/dev/null 2>&1; then
            git push origin ":refs/tags/$tag_name"
          fi

          gh release create "$tag_name" "${assets[@]}" \
            --target "$GITHUB_SHA" \
            --title "$release_name" \
            --notes-file RELEASE_NOTES.md
